{% macro campoNuevo(field, class='', readonly=False) %}
<div class="relative w-full mb-6">

    {{ field(
        class=class,
        readonly=readonly,
        placeholder=' '
    ) }}

    <label for="{{ field.id }}"
        class="absolute text-sm text-stone-500 duration-300 transform -translate-y-6 scale-75 top-3
        z-10 origin-[0] peer-focus:text-red-600 peer-placeholder-shown:scale-100
        peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">
        {{ field.label.text }}
    </label>

    {% if field.errors %}
        {% for error in field.errors %}
            <p class="text-red-500 text-xs mt-1">⚠ {{ error }}</p>
        {% endfor %}
    {% endif %}

</div>
{% endmacro %}
